<!-- 
    INTÉGRATION DANS TON CATALOGUE EXISTANT :

<!-- STRUCTURE DE LA MODALE (PANEL) -->
<div id="carDetailModal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="modalCarName">BMW X3</h2>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        
        <!-- Galerie d'images (tu peux remplacer les src par tes vraies images) -->
        <div class="modal-gallery" id="modalGallery">
            <!-- Les images seront injectées dynamiquement ou pré-définies -->
        </div>
        
        <div class="modal-body">
            <div class="modal-price" id="modalCarPrice">750 DH / jour</div>
            
            <div class="info-grid" id="modalInfoGrid">
                <!-- Les infos dynamiques seront insérées ici -->
            </div>
            
            <div class="car-description" id="modalDescription">
                Description du véhicule...
            </div>
        </div>
        
        <div class="modal-footer">
            <div class="modal-price-footer" id="modalFooterPrice">750 DH / jour</div>
            <button class="rent-now-btn" id="modalRentBtn">
                🔑 Réserver maintenant
            </button>
        </div>
    </div>
</div>

            images: [
                "https://placehold.co/400x300/4a6741/white?text=Jeep+Gladiator",

        "citroen-c4x": {
            name: "Citroën C4X",
            price: "550 DH / jour",
            priceValue: 550,
            category: "Crossover Fastback",

            ]
        }
    };
    
    // Informations additionnelles communes pour les voitures non présentes dans la DB
    function getDefaultCarInfo(carName, carPrice = "à partir de 600 DH/jour") {
        return {
            name: carName,
            price: carPrice,
            priceValue: parseInt(carPrice) || 650,
            category: "Véhicule de tourisme",
            transmission: "Automatique / Manuelle",
            fuel: "Essence / Diesel",
            seats: 5,
            kmIncluded: "200 km / jour",
            deposit: "6 000 MAD",
            engine: "Moteur moderne",
            power: "120 - 200 chevaux",
            maxSpeed: "190 km/h",
            consumption: "6.5 L/100 km",
            description: "Véhicule équipé de la climatisation, écran tactile, aide au stationnement et systèmes de sécurité avancés. Confort et fiabilité.",
            images: [
                "https://placehold.co/400x300/708090/white?text=" + encodeURIComponent(carName),
                "https://placehold.co/400x300/5a6e7a/white?text=Interieur"
            ]
        };
    }
    
    // Fonction pour ouvrir la modale avec les données d'une voiture spécifique
    function openCarModal(carId) {
        let carData = carsDatabase[carId];
        
        // Si la voiture n'est pas dans la base, on essaie de récupérer par nom (utile si tu passes le nom)
        if (!carData) {
            // fallback: essayer de trouver par correspondance de nom approximative? 
            // Pour simplifier, on crée un objet générique basé sur l'ID affiché
            const genericName = carId.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            carData = getDefaultCarInfo(genericName, "650 DH / jour");
            carData.name = genericName;
        }
        
        // Remplir les éléments de la modale
        document.getElementById('modalCarName').innerText = carData.name;
        document.getElementById('modalCarPrice').innerText = carData.price;
        document.getElementById('modalFooterPrice').innerText = carData.price;
        
        // Générer la grille d'informations dynamique
        const infoGrid = document.getElementById('modalInfoGrid');
        infoGrid.innerHTML = `
            <div class="info-item"><span class="info-label">Catégorie :</span><span class="info-value">${carData.category || "—"}</span></div>
            <div class="info-item"><span class="info-label">Transmission :</span><span class="info-value">${carData.transmission || "—"}</span></div>
            <div class="info-item"><span class="info-label">Carburant :</span><span class="info-value">${carData.fuel || "—"}</span></div>
            <div class="info-item"><span class="info-label">Places :</span><span class="info-value">${carData.seats || "5"} places</span></div>
            <div class="info-item"><span class="info-label">Kilométrage :</span><span class="info-value">${carData.kmIncluded || "200 km/jour"}</span></div>
            <div class="info-item"><span class="info-label">Caution :</span><span class="info-value">${carData.deposit || "6 000 MAD"}</span></div>
            <div class="info-item"><span class="info-label">Moteur :</span><span class="info-value">${carData.engine || "—"}</span></div>
            <div class="info-item"><span class="info-label">Puissance :</span><span class="info-value">${carData.power || "—"}</span></div>
            <div class="info-item"><span class="info-label">Vitesse max :</span><span class="info-value">${carData.maxSpeed || "—"}</span></div>
            <div class="info-item"><span class="info-label">Consommation :</span><span class="info-value">${carData.consumption || "—"}</span></div>
        `;
        
        // Description
        document.getElementById('modalDescription').innerHTML = carData.description || "Véhicule récent, entretien rigoureux, équipements complets : écran tactile, caméra de recul, climatisation automatique. Disponible immédiatement.";
        
        // Générer la galerie d'images (si des images existent)
        const galleryContainer = document.getElementById('modalGallery');
        galleryContainer.innerHTML = '';
        if (carData.images && carData.images.length > 0) {
            carData.images.forEach((imgUrl, idx) => {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'gallery-img';
                imgDiv.style.backgroundImage = `url('${imgUrl}')`;
                imgDiv.style.backgroundSize = 'cover';
                imgDiv.title = `Vue ${idx+1}`;
                if (idx === 0) imgDiv.classList.add('active');
                imgDiv.addEventListener('click', () => {
                    document.querySelectorAll('.gallery-img').forEach(el => el.classList.remove('active'));
                    imgDiv.classList.add('active');
                    // On pourrait étendre pour afficher en grand, mais déjà bien
                });
                galleryContainer.appendChild(imgDiv);
            });
        } else {
            // image placeholder générique
            const placeholder = document.createElement('div');
            placeholder.className = 'gallery-img active';
            placeholder.style.background = '#cbd5e1';
            placeholder.style.display = 'flex';
            placeholder.style.alignItems = 'center';
            placeholder.style.justifyContent = 'center';
            placeholder.innerText = '📸';
            placeholder.style.fontSize = '2rem';
            galleryContainer.appendChild(placeholder);
        }
        
        // Afficher la modale
        const modal = document.getElementById('carDetailModal');
        modal.classList.add('active');
        
        // Stocker temporairement le nom pour le bouton de réservation
        const rentBtn = document.getElementById('modalRentBtn');
        rentBtn.onclick = () => {
            alert(`🔐 Demande de réservation pour : ${carData.name}\nPrix : ${carData.price}\nUn conseiller vous contactera sous 24h.`);
            // Tu peux remplacer par redirection ou ouverture de formulaire
        };
    }
    
    // Fermeture de la modale
    function closeModal() {
        document.getElementById('carDetailModal').classList.remove('active');
    }
    
    // Gestionnaire d'événements pour fermer la modale (bouton X, clic sur overlay)
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('carDetailModal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    
    // =============================================
    // EXEMPLE D'INTÉGRATION DANS TON CATALOGUE EXISTANT
    // =============================================
    // Tu dois associer chaque bouton "Voir plus" de ton catalogue à l'appel de openCarModal(id)

    /*

        document.querySelectorAll('.voir-plus-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const carId = btn.getAttribute('data-car-id'); // ex: "bmw-x3"
                if(carId) openCarModal(carId);
            });
        });
    */
    
    // Pour démonstration, on crée des boutons factices (si tu veux tester le panel immédiatement)
    // Supprime ou commente cette section après intégration dans ton vrai catalogue.
    if(document.querySelectorAll('.demo-test-btn').length === 0) {
        const demoArea = document.createElement('div');
        demoArea.style.position = 'fixed';
        demoArea.style.bottom = '20px';
        demoArea.style.right = '20px';
        demoArea.style.background = '#1e2a3e';
        demoArea.style.padding = '12px 18px';
        demoArea.style.borderRadius = '40px';
        demoArea.style.zIndex = '999';
        demoArea.style.display = 'flex';
        demoArea.style.gap = '10px';
        demoArea.style.flexWrap = 'wrap';
        demoArea.innerHTML = `
            <button class="demo-test-btn" data-demo-id="bmw-x3" style="background:#0f2b2d; border:none; color:white; padding:6px 14px; border-radius:40px;">Test BMW X3</button>
            <button class="demo-test-btn" data-demo-id="audi-etron-gt" style="background:#0f2b2d; border:none; color:white; padding:6px 14px; border-radius:40px;">Test Audi e-tron GT</button>
            <button class="demo-test-btn" data-demo-id="range-rover-sport" style="background:#0f2b2d; border:none; color:white; padding:6px 14px; border-radius:40px;">Test Range Rover</button>
            <button class="demo-test-btn" data-demo-id="jeep-gladiator" style="background:#0f2b2d; border:none; color:white; padding:6px 14px; border-radius:40px;">Test Gladiator</button>
        `;
        document.body.appendChild(demoArea);
        
        document.querySelectorAll('.demo-test-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const demoId = btn.getAttribute('data-demo-id');
                if(demoId) openCarModal(demoId);
            });
        });
    }
    
    // Expose la fonction globalement pour que ton catalogue existant puisse l'appeler
    window.openCarModal = openCarModal;
    window.closeCarModal = closeModal;
    
    console.log("✅ Panel modale prêt ! Utilise window.openCarModal('car-id') pour afficher les détails.");
</script>
