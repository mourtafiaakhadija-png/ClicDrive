    *{

        :root {

        }

        }

           color: white;

        }

            content: "";
            position: absolute;

            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: all 0.3s ease;
        }
        .nav-links a:hover::after {
            width: 100%;
        }
        .logo {

            font-weight: 700;
            
        }

            border-radius: 15px;

        }
        .logo-footer{
            background-color: #fff;
            color: var(--primary);
        }

        }

        <p id="prixTotal" style="text-align:center; font-size:20px; margin-top:15px; color:rgb(210, 205, 211);"></p>

<script>

let voiture = document.querySelector("select");
let dateDebut = document.querySelectorAll("input[type='date']")[0];
let dateFin = document.querySelectorAll("input[type='date']")[1];
let result = document.getElementById("prixTotal");

function calcul() {
    let prix = parseFloat(voiture.value);

    if (!prix || !dateDebut.value || !dateFin.value) {
        result.innerHTML = "";
        return;
    }

    let d1 = new Date(dateDebut.value);
    let d2 = new Date(dateFin.value);

    let jours = (d2 - d1) / (1000 * 60 * 60 * 24);

    if (jours <= 0) {
        result.innerHTML = "";
        return;
    }

    let total = prix * jours;

    result.innerHTML = " Prix total: " + total + " DH (" + jours + " jours)";
}
voiture.addEventListener("change", calcul);
dateDebut.addEventListener("change", calcul);
dateFin.addEventListener("change", calcul);
</script>
