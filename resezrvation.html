<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web-projet</title>
    <style>
    body {
        background-image: url("image1.jpg");
         background-position: center;
         background-repeat: no-repeat;
         background-size: cover; 
         }

    .container {
    display: flex;
    justify-content: center;
    align-items: center;  
    height: 150vh;
    color:white
         }
    .form {
    border:2px solid rgba(38, 12, 50, 0.2) ;
    backdrop-filter: blur(25px);
    padding: 50px;
    width: 460px;
    border-radius: 20px;
    color:white
          }
     h2 {
    text-align: center;
    margin-bottom: 20px;
    color:white
         }
    .row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    color:white
    
         }
    input, textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid white;
    border-radius: 8px;
    outline: none;
    background-color: transparent;
    color:white
                }
    input::placeholder {
    color:white ;
}
    textarea {
    height: 80px;
    margin-bottom: 15px;
    color:white;
    background-color: transparent;
     
         }
    textarea::placeholder{
    color: white;
         }
   .transparent-select {
  background: transparent;
  border: 1px solid rgb(253, 253, 253);
  color: rgb(247, 244, 244);
  margin-bottom: 5px;
                       }
    button {
    width: 100%;
    padding: 12px;
    background: #29272b;
    font-size: 16px;
    border-radius: 8px;
    cursor: pointer;
    color: white;
      }
</style>
</head>

</html>
